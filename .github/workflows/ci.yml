name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run ty check
      - name: Test
        run: uv run pytest
      - name: Build
        run: uv build
